{% extends 'base.html' %}

{% block title %}Authentification - CV Express{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Tabs -->
        <div class="bg-white rounded-lg shadow-lg">
            <div class="flex border-b border-gray-200">
                <button class="flex-1 py-4 text-center font-bold text-gray-700 border-b-2 border-blue-600 tab-btn" data-tab="login">
                    <i class="fas fa-sign-in-alt mr-2"></i>Connexion
                </button>
                <button class="flex-1 py-4 text-center font-bold text-gray-500 hover:text-gray-700 tab-btn" data-tab="register">
                    <i class="fas fa-user-plus mr-2"></i>Inscription
                </button>
            </div>
            
            <!-- Login Tab -->
            <div id="login" class="tab-content p-8">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Connectez-vous</h2>
                
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Email</label>
                        <input type="email" id="login-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="votre@email.com">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 font-medium mb-2">Mot de passe</label>
                        <input type="password" id="login-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="••••••••">
                    </div>
                    
                    <div id="login-error" class="text-red-600 text-sm mb-4 hidden"></div>
                    
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                        <span id="login-btn-text">Se Connecter</span>
                        <span id="login-btn-loading" class="hidden">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">Mot de passe oublié?</a>
                </div>
            </div>
            
            <!-- Register Tab -->
            <div id="register" class="tab-content p-8 hidden">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Créer un Compte</h2>
                
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Nom Complet</label>
                        <input type="text" id="register-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Jean Dupont">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Email</label>
                        <input type="email" id="register-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="votre@email.com">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Mot de passe</label>
                        <input type="password" id="register-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="••••••••">
                        <p class="text-gray-600 text-sm mt-1">Au moins 8 caractères</p>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 font-medium mb-2">Confirmer le mot de passe</label>
                        <input type="password" id="register-password-confirm" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" placeholder="••••••••">
                    </div>
                    
                    <div class="mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="register-terms" required class="w-4 h-4 text-blue-600">
                            <span class="ml-2 text-gray-600">J'accepte les <a href="#" class="text-blue-600 hover:underline">conditions d'utilisation</a></span>
                        </label>
                    </div>
                    
                    <div id="register-error" class="text-red-600 text-sm mb-4 hidden"></div>
                    
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                        <span id="register-btn-text">S'Inscrire</span>
                        <span id="register-btn-loading" class="hidden">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Gestion des tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tabName = this.dataset.tab;
            
            // Masquer tous les tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });
            
            // Afficher le tab sélectionné
            document.getElementById(tabName).classList.remove('hidden');
            
            // Mettre à jour les boutons
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-blue-600', 'text-gray-700', 'font-bold');
                b.classList.add('text-gray-500');
            });
            this.classList.add('border-blue-600', 'text-gray-700', 'font-bold');
            this.classList.remove('text-gray-500');
        });
    });
    
    // Handlers
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');
        
        document.getElementById('login-btn-text').classList.add('hidden');
        document.getElementById('login-btn-loading').classList.remove('hidden');
        
        try {
            const response = await login(email, password);
            if (response.access) {
                localStorage.setItem('access_token', response.access);
                localStorage.setItem('refresh_token', response.refresh);
                localStorage.setItem('user_email', email);
                window.location.href = '/dashboard';
            }
        } catch (error) {
            errorDiv.textContent = error.message || 'Erreur de connexion';
            errorDiv.classList.remove('hidden');
        } finally {
            document.getElementById('login-btn-text').classList.remove('hidden');
            document.getElementById('login-btn-loading').classList.add('hidden');
        }
    }
    
    async function handleRegister(e) {
        e.preventDefault();
        const fullName = document.getElementById('register-name').value;
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-password-confirm').value;
        const errorDiv = document.getElementById('register-error');
        
        if (password !== confirmPassword) {
            errorDiv.textContent = 'Les mots de passe ne correspondent pas';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        // Split full name into first and last name
        const nameParts = fullName.trim().split(' ');
        const firstName = nameParts[0];
        const lastName = nameParts.slice(1).join(' ') || 'User';
        
        document.getElementById('register-btn-text').classList.add('hidden');
        document.getElementById('register-btn-loading').classList.remove('hidden');
        
        try {
            const response = await register(firstName, lastName, email, password, confirmPassword);
            if (response) {
                errorDiv.classList.add('hidden');
                
                // Show OTP verification if needed
                if (response.otp_required) {
                    // Redirect to OTP verification page
                    window.location.href = '/auth#otp';
                } else {
                    // Show success and redirect to login
                    alert('Inscription réussie! Veuillez vous connecter.');
                    document.getElementById('register-form').reset();
                    document.querySelector('[data-tab="login"]').click();
                }
            }
        } catch (error) {
            console.error('Register error:', error);
            errorDiv.textContent = error.message || 'Erreur d\'inscription';
            errorDiv.classList.remove('hidden');
        } finally {
            document.getElementById('register-btn-text').classList.remove('hidden');
            document.getElementById('register-btn-loading').classList.add('hidden');
        }
    }
</script>
{% endblock %}
