{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion - CV Express{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-gray-50 to-primary-50 dark:from-gray-900 dark:to-gray-800">
  <div class="max-w-md w-full space-y-8 bg-white dark:bg-gray-800 p-10 rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-700">
    <div>
      <div class="mx-auto h-16 w-16 bg-gradient-to-r from-emerald-500 to-primary-500 rounded-2xl flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
        </svg>
      </div>
      <h2 class="text-center text-3xl font-bold text-gray-900 dark:text-white mb-2">
        Bienvenue de retour
      </h2>
      <p class="text-center text-gray-600 dark:text-gray-400">
        Connectez-vous pour accéder à vos CV
      </p>
    </div>
    
    <form id="login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
          Email
        </label>
        <input type="email" id="email" name="email" required 
               class="auth-input w-full px-4 py-3" 
               placeholder="votre@email.com"
               autocomplete="email">
      </div>
      
      <div>
        <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
          Mot de passe
        </label>
        <div class="relative">
          <input type="password" id="password" name="password" required 
                 class="auth-input w-full px-4 py-3 pr-12" 
                 placeholder="Votre mot de passe"
                 autocomplete="current-password">
          <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>
      
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember" name="remember" type="checkbox" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
          <label for="remember" class="ml-2 block text-sm font-medium text-gray-900 dark:text-gray-300">
            Se souvenir de moi
          </label>
        </div>
        <a href="#" class="text-sm font-semibold text-primary-600 dark:text-primary-400 hover:text-primary-700">
          Mot de passe oublié ?
        </a>
      </div>
      
      <button type="submit" class="w-full btn-primary text-lg py-4 font-semibold shadow-xl hover:shadow-2xl">
        Se connecter
      </button>
    </form>
    
    <div class="text-center">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Pas de compte ? <a href="/auth/register/" class="font-semibold text-primary-600 dark:text-primary-400 hover:text-primary-700 transition">S'inscrire</a>
      </p>
    </div>
    
    <div class="divider my-8">
      <span class="px-4 bg-white dark:bg-gray-800 text-gray-500 text-xs uppercase">ou</span>
    </div>
    
    <button class="w-full flex items-center justify-center px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 shadow-sm hover:shadow-md transition-all duration-200 text-gray-900 dark:text-white">
      <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      </svg>
      Continuer avec Google
    </button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('login-form');
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    cvApp.showLoading();
    try {
      await cvApp.loginUser(email, password);
    } catch (error) {
      cvApp.showToast('Email ou mot de passe incorrect.', 'error');
    } finally {
      cvApp.hideLoading();
    }
  });
});
</script>

<style>
.divider {
  position: relative;
}
.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, #e5e7eb, transparent);
  dark: #374151;
}
</style>
{% endblock %}
